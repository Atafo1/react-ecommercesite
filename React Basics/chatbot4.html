         <!DOCTYPE html>
<!-- THE LESSON WILL BE ON STATE AND EVENT HANDLERS-->
<!-- Jsx is an enhanced js , its like js and html combined -->
<html>
  <head>
    <title>Chatbot</title>
   <style>
    body{
        font-family:Arial;
        margin-top: 0px;
        margin-bottom: 0px;
    }
       .send-button{
        background-color: rgb(25, 135, 84);
        color: white;
        padding:12px 20px;
        margin-left: 10px;
        border:none;
        border-radius:10px;
        font-size: 15px;
        cursor :pointer;
       }
       .chat-input{
        padding: 12px 15px;
        border-radius: 10px;
        border-width: 1px;
        font-size:15px;
       /*flex grow allows an element take up the remaining space in the layout */
        flex-grow:1 ;
       }
       .chat-input-container{
           display: flex;
           margin-bottom: 60px;
       }
       .app-container{
        max-width: 600px;
        margin-left:auto;
        margin-right:auto;
        height:100vh;
        display: flex;
        flex-direction:column;
        
       }
       .chat-message-user{
           display:flex;
           justify-content: end;
           align-items: start;/*by default its in stretch because its a flexbox but start
                             will display from up to down*/
       }
        .chat-message-robot{
           display:flex;
           justify-content: left;
           align-items: start;
       }
       .chat-message-text{
        background-color: rgb(238,238,238);
       padding: 15px 20px;
       border-radius:10px;
       margin-right: 10px;
       margin-left: 10px;
       margin-bottom: 20px;
       max-width: 300px;
       }

       .chat-message-profile{
        width:45px;
       }
       /*HOOKS LETS US INSERT REACT FEATURES INTO OUR COMPONENTS*/
      /*useEffect lets us run some code after a component as been created or updated*/
       .chat-messages-container{
        flex-grow: 1;
        margin-top:20px;
        overflow: scroll;
        /*to hide scroll bar  */
        scrollbar-width: none;
       }
       .welcome{
        text-align: center;
       }
   </style>
  </head>
  <body>
    <div class="js-container"></div>
         
    <script src="https://unpkg.com/supersimpledev@8.6.4/external-library.js"></script>
     <script src="https://unpkg.com/supersimpledev/react.js"></script><!-- used to access the react external library for building apps and websites -->
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script><!-- used to access the react external library for building apps and websites -->

    <script src="https://unpkg.com/supersimpledev@8.6.4/chatbot.js"></script>


    <script src="https://unpkg.com/supersimpledev/babel.js"></script> <!-- this is an external library called babel which is a js
    complier to translate languages into js -->
    <script type="text/babel">
    //  note: in jsx all elements need a closing tag .<input /> shortcut for <input></input>
    
      function ChatInput({chatMessages,setChatMessages}){
       const[inputText,setInputText]= React.useState('');
        function saveInputText(event){
            //event.target help us get access the the input text or button that 
            //triggered the event
             setInputText(event.target.value);
        }
         async function sendMessage(){
            setInputText('');
           const newChatMessages=[
             
              ...chatMessages,
              {
                message:inputText,
                sender:'user',
                id:crypto.randomUUID()
              }
            ]
           setChatMessages(newChatMessages);
          setChatMessages([
            ...newChatMessages,
            // This creates a temporary Loading... message.
            // Because we don't save this message in newChatMessages,
            // it will be removed later, when we add the response.
            {
              message: <img src="loading-spinner.gif" className="loading-spinner" />,
              sender: 'robot',
              id: crypto.randomUUID()
            }
          ]);


         const response = await Chatbot.getResponseAsync(inputText);
            setChatMessages([
             
              ...newChatMessages,
              {
                message:response,
                sender:'robot',
                id:crypto.randomUUID()
              }
            ]);
            setInputText('');
        }
        function pressKey(event){
            if(event.key==="Enter"){
                sendMessage();
            }
           else if(event.key==="Escape"){
                setInputText('');
            }
        }
        
        return(
            <div className="chat-input-container">
                {/* <> are called fragment they allow grouping of elements without
                 creating an extra div*/}
              <input 
                    placeholder="Send the message to Chatbot"  
                     size="30" 
                     //onChange runs a function when we change the text inside
                     //the input
                    onChange={saveInputText}
                    value={inputText}
                    onKeyDown={pressKey}
                    className="chat-input"
                    //value lets us set the value in the input
              />
              <button
                onClick={sendMessage}
                //down below is the declaration of class in react and it is className because in js 
                // there is a reserved word called class
                className="send-button"
              >Send</button>
            </div>
        );
      }
      function ChatMessage({message,sender}){
          
            return (
                <div className={
                    sender==='user'
                    ?"chat-message-user"
                    :"chat-message-robot"
                }>
                    {/*  shorcut for the if statement ,if sender is equal to 
                        robot then it returns the image*/}
                 {sender === "robot" &&  
                    ( <img src="robotpic.png"  className="chat-message-profile"/>)
                }
                <div className="chat-message-text">
                 {message}
                 </div>
                {sender ==="user" && 
                    (<img src="profilepic.png"  className="chat-message-profile"/>)
                }
                </div>
            );
          }
        function ChatMessages({chatMessages}){
            {/*useRef is another hook used to save html element*/}
           const chatMessagesRef= React.useRef(null);
            {/*hooks should always be at the top*/
            /*HOOKS LETS US INSERT REACT FEATURES INTO OUR COMPONENTS*/
              /*useEffect lets us run some code after a component as been created or updated*/
            }
            React.useEffect(()=>{
               const containerElem=chatMessagesRef.current;
               if(containerElem){
                containerElem.scrollTop=containerElem.scrollHeight;
               }
            },[chatMessages]);
            return (
                <div className="chat-messages-container" ref={chatMessagesRef}>
             { chatMessages.map((chatMessage) =>{
                    return(
                        <ChatMessage
                        message={chatMessage.message}
                        sender={chatMessage.sender}
                        key={chatMessage.id}
                        />
                       );
               }) }
               </div>
            );
        }
        function Display({chatMessages}){
            if(chatMessages.length===0){
                return(
                    <h4 className="welcome">Welcome to the chatbot project! send a message in the textbox</h4>
                );

            }
        }
          function App(){
            const [chatMessages,setChatMessages]=  React.useState([]);
    
             //note you can not style a fragment
            
            return (

            <div className="app-container">
                 
                 {/*you can put javascript directly into the function call braces like below
                    */}
                <ChatMessages 
                chatMessages={chatMessages}
                />
                <Display chatMessages={chatMessages}/>
                <ChatInput 
                    chatMessages={chatMessages}
                    setChatMessages={setChatMessages}
                 />
            </div> 
            );
          }

             
      const container = document.querySelector('.js-container');  //this container is basically where everything we code will be
    //   displayed
      ReactDOM.createRoot(container).render(<App />);
    //   render ,let's us display things in the container
    </script>
  </body>
</html>
