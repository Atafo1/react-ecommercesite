<!DOCTYPE html>
<html>
  <head>
    <title>React Basics</title>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

     <script src="https://unpkg.com/supersimpledev/dayjs.js"></script> <!-- an external library for dates -->

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
        const div=(
            <div>
                <h1>Cotton socks</h1>
                <h1>Price: $10</h1>
                <button>Add to Cart</button>
              
            </div>
            
        );
       
        const time=dayjs().format('HH:mm:ss');
        const date= dayjs().format('MMMM D');
        const product =10+8*2;
        const book=20;
        const total=product +book;
        const div2=(
            <div>
                <p>The time is {time}</p>
                <p>Today is {date}</p>
            <p>The cost is ${product}</p>
            <p>The book cost is ${book}</p>
            <p>the total cost is ${total} </p>
            </div> 

        );
      const container = document.querySelector('.js-container');
      const root= ReactDOM.createRoot(container);
     root.render(div2);
     setInterval(()=>{<p>The time is  {dayjs().format('HH:mm:ss')}</p>
    
   root.render(div2); },1000);
    </script>
  </body>
</html>
