        <!DOCTYPE html>
<!-- THE LESSON WILL BE ON STATE AND EVENT HANDLERS-->
<!-- Jsx is an enhanced js , its like js and html combined -->
<html>
  <head>
    <title>Chatbot</title>
   
  </head>
  <body>
    <div class="js-container"></div>
         
    <script src="https://unpkg.com/supersimpledev@8.6.4/external-library.js"></script>
     <script src="https://unpkg.com/supersimpledev/react.js"></script><!-- used to access the react external library for building apps and websites -->
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script><!-- used to access the react external library for building apps and websites -->

    <script src="https://unpkg.com/supersimpledev@8.6.4/chatbot.js"></script>


    <script src="https://unpkg.com/supersimpledev/babel.js"></script> <!-- this is an external library called babel which is a js
    complier to translate languages into js -->
    <script type="text/babel">
    //  note: in jsx all elements need a closing tag .<input /> shortcut for <input></input>
    
      function ChatInput({chatMessages,setChatMessages}){
       const[inputText,setInputText]= React.useState('');
        function saveInputText(event){
            //event.target help us get access the the input text or button that 
            //triggered the event
             setInputText(event.target.value);
        }
        function sendMessage(){
        const newChatMessages=[
             
              ...chatMessages,
              {
                message:inputText,
                sender:'user',
                id:crypto.randomUUID()
              }
            ]
         setChatMessages(newChatMessages);
         const response = Chatbot.getResponse(inputText);
            setChatMessages([
             
              ...newChatMessages,
              {
                message:response,
                sender:'robot',
                id:crypto.randomUUID()
              }
            ]);
            setInputText('');
        }
        function pressKey(event){
            if(event.key==="Enter"){
                sendMessage();
            }
           else if(event.key==="Escape"){
                setInputText('');
            }
        }
        
        return(
            <>{/* <> are called fragment they allow grouping of elements without
                 creating an extra div*/}
              <input 
                    placeholder="Send the message to Chatbot"  
                     size="30" 
                     //onChange runs a function when we change the text inside
                     //the input
                    onChange={saveInputText}
                    value={inputText}
                    onKeyDown={pressKey}
                    //value lets us set the value in the input
              />
              <button
                onClick={sendMessage}
              >Send</button>
            </>
        );
      }
      function ChatMessage({message,sender}){
          
            return (
                <div>
                    {/*  shorcut for the if statement ,if sender is equal to 
                        robot then it returns the image*/}
                 {sender === "robot" &&  
                    ( <img src="robotpic.png"  width="50"/>)
                }
                 {message}
                {sender ==="user" && 
                    (<img src="profilepic.png"  width="50"/>)
                }
                </div>
            );
          }
        function ChatMessages({chatMessages}){
            return (
                <>
             { chatMessages.map((chatMessage) =>{
                    return(
                        <ChatMessage
                        message={chatMessage.message}
                        sender={chatMessage.sender}
                        key={chatMessage.id}
                        />
                       );
               }) }
               </>
            );
        }
          function App(){
            const [chatMessages,setChatMessages]=  React.useState([

                {
                   message:"hello chatbot",
                   sender:"user" ,
                   id:"id1"
                },
                 
                 {
                   message:"Hello! How can I help you?",
                   sender:"robot",
                   id:"id2"
                },
                {
                   message:"can you get me today's date?",
                   sender:"user" ,
                   id:"id3"
                },
                 {
                   message:"Today is September",
                   sender:"robot" ,
                   id:"id4"
                }
            ]

          );
    
             
            
            return (
            <>
                 <ChatInput 
                    chatMessages={chatMessages}
                    setChatMessages={setChatMessages}
                 />
                 {/*you can put javascript directly into the function call braces like below
                    */}
                <ChatMessages 
                chatMessages={chatMessages}
                />
            </> 
            );
          }

             
      const container = document.querySelector('.js-container');  //this container is basically where everything we code will be
    //   displayed
      ReactDOM.createRoot(container).render(<App />);
    //   render ,let's us display things in the container
    </script>
  </body>
</html>
